service: condoconnect-ai-core
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1 
  memorySize: 256 
  environment:
    # Usamos fallback: si no existe la variable en tu PC, usa 'llave_prueba'
    STRIPE_SECRET_KEY: ${env:STRIPE_SECRET, 'sk_test_llave_de_prueba'}
    MERCADOPAGO_TOKEN: ${env:MP_TOKEN, 'APP_USR-token_de_prueba'}
  iamRoleStatements:
    - Effect: "Allow"
      Action:
        - "dynamodb:*"
        - "rekognition:SearchFacesByImage"
        - "iot:Publish"
        - "cognito-idp:*"
      Resource: "*"

functions:
  AuthBiometrica:
    handler: lambdas/auth_biometrica.handler
    events:
      - http:
          path: api/v1/auth/biometria
          method: post
          cors: true

IntegracionSistemasExternos:
    handler: lambdas/marina_api_integrator.handler
    events:
      - http:
          path: api/v1/marina/integracion
          method: post
          cors: true

  RouterEticoMarina:
    handler: lambdas/marina_router_etico.handler
    events:
      - http:
          path: api/v1/marina/auditoria
          method: post
          cors: true

  ControlAccesosIoT:
    handler: lambdas/control_accesos_iot.handler
    events:
      - http:
          path: api/v1/iot/puertas
          method: post
          cors: true

  FiltroPagosSaaS:
    handler: lambdas/FiltroAcceso_Pagos_Cognito.handler

resources:
  Resources:
    CondoConnectTablaPrincipal:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Tabla_Operaciones_CondoConnect
        BillingMode: PAY_PER_REQUEST # Solo pagas si la usan
        AttributeDefinitions:
          - AttributeName: PK (ID_Propiedad)
            AttributeType: S
          - AttributeName: SK (Tipo_Registro)
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        # 🔥 EL ESCUDO ANTI-PÉRDIDAS (Point-in-Time Recovery)
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true